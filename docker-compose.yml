services:
  # FastAPI Backend
  api:
    build:
      context: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro
      - ./logs:/app/logs
    environment:
      - EQUIPAY_MODE=FAST
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - equipay-network

  # Streamlit Dashboard  
  dashboard:
    build:
      context: .
    command: ["streamlit", "run", "app/dashboard.py", "--server.port=8501", "--server.address=0.0.0.0", "--server.headless=true"]
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro
      - ./logs:/app/logs
    environment:
      - EQUIPAY_MODE=FAST
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - equipay-network

  # Development container
  dev:
    build:
      context: .
      target: development
    volumes:
      - .:/app
      - /app/__pycache__
    ports:
      - "8888:8888"  # Jupyter
      - "8000:8000"  # API
      - "8501:8501"  # Dashboard
    environment:
      - LOG_LEVEL=DEBUG
      - PYTHONPATH=/app
    stdin_open: true
    tty: true
    profiles:
      - dev

networks:
  equipay-network:
    driver: bridge